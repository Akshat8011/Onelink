name: Daily Event Scraper

# Single source of truth for Lucknow BookMyShow events.
# Writes scraper/data/events_lucknow.{json,csv} + mobile bundled JSON and commits.
on:
  schedule:
    # 6:00 AM IST  = 00:30 UTC
    - cron: "30 0 * * *"
    # 6:00 PM IST  = 12:30 UTC (backup refresh)
    - cron: "30 12 * * *"
  workflow_dispatch:

concurrency:
  group: daily-event-scraper
  cancel-in-progress: false

jobs:
  scrape-events:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # Real Chrome binary (not Ubuntu's broken chromium-browser snap stub).
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run BookMyShow scraper
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          BMS_SKIP_DETAILS: "1"
          # Short waits — long page_source polls were stalling CI for minutes.
          BMS_WAIT_SECONDS: "12"
          BMS_PAGE_TIMEOUT: "35"
          BMS_CATEGORY_BUDGET_SEC: "55"
          BMS_MIN_SUCCESS_COUNT: "15"
          BMS_PRESERVE_ON_EMPTY: "1"
        run: |
          set -euo pipefail
          echo "Chrome binary: ${CHROME_BIN}"
          "${CHROME_BIN}" --version || true

          # One warm attempt + one retry only if the on-disk dataset is empty.
          attempt=1
          max=2
          while [ "$attempt" -le "$max" ]; do
            echo "::group::Scrape attempt ${attempt}/${max}"
            set +e
            python scraper/scrape_events.py
            status=$?
            set -e
            echo "::endgroup::"

            COUNT=$(python -c "import json, pathlib; p=pathlib.Path('scraper/data/events_lucknow.json'); print(len(json.load(p.open())['events']) if p.exists() else 0)")
            echo "Events on disk after attempt ${attempt}: ${COUNT}"

            if [ "$status" -eq 0 ] && [ "$COUNT" -gt 0 ]; then
              break
            fi
            if [ "$attempt" -eq "$max" ]; then
              if [ "$COUNT" -gt 0 ]; then
                echo "::warning::Scraper exited ${status} but previous/partial dataset has ${COUNT} events — continuing."
                break
              fi
              echo "::error::BookMyShow scrape produced 0 events after ${max} attempts"
              exit 1
            fi
            sleep 20
            attempt=$((attempt + 1))
          done

          python scraper/enrich_images.py || echo "::warning::Image enrich had issues (non-fatal)"

      - name: Sync bundled mobile events JSON
        run: |
          cp scraper/data/events_lucknow.json mobile/src/data/events_lucknow.scraped.json
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("mobile/src/data/events_lucknow.scraped.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          events = data.get("events") or []
          n = len(events)
          imgs = sum(1 for e in events if (e.get("image_url") or "").strip())
          scraped = data.get("scraped_at", "?")
          print(f"Bundled events: {n} (images={imgs}, scraped_at={scraped})")
          if n < 1:
              raise SystemExit("Refusing to commit an empty events dataset")
          if imgs < max(1, int(n * 0.8)):
              raise SystemExit(f"Refusing to commit: only {imgs}/{n} events have images")
          PY

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/data/events_lucknow.csv scraper/data/events_lucknow.json mobile/src/data/events_lucknow.scraped.json
          if git diff --staged --quiet; then
            echo "No data changes to commit (tally unchanged this run)."
          else
            COUNT=$(python -c "import json; print(json.load(open('scraper/data/events_lucknow.json'))['total_count'])")
            IMGS=$(python -c "import json; e=json.load(open('scraper/data/events_lucknow.json'))['events']; print(sum(1 for x in e if (x.get('image_url') or '').strip()))")
            git commit -m "chore: update Lucknow events data (${COUNT} listings, ${IMGS} images)"
            git push || { git pull --rebase --autostash origin main && git push; }
          fi
